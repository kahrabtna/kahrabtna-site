<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كشف حساب الفنيين | كهربتنا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: '#008ba3', darkBg: '#121212' } } }
        }
    </script>
    <style> body { font-family: 'Cairo', sans-serif; } </style>
</head>
<body class="bg-gray-100 dark:bg-darkBg min-h-screen p-4">

    <div class="max-w-md mx-auto">
        <div id="loginBox" class="bg-white p-8 rounded-[2.5rem] shadow-2xl text-center border border-brand/10 mt-10">
            <img src="kkkkkkk.jpeg" class="h-16 w-16 mx-auto rounded-2xl mb-4 shadow-md">
            <h2 class="text-xl font-black text-brand mb-2">كشف حساب 15 يوم</h2>
            <p class="text-[10px] text-gray-400 mb-6 font-bold uppercase tracking-widest">Technician Financial Report</p>
            
            <input type="number" id="inputID" placeholder="أدخل كود الفني" class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-brand text-center font-bold mb-4 outline-none">
            <button onclick="fetchData()" class="w-full bg-brand text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">عرض الكشف التفصيلي</button>
        </div>

        <div id="dashboard" class="hidden space-y-4">
            <div class="bg-brand p-6 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex justify-between items-center mb-6">
                        <h3 id="displayName" class="font-black text-lg italic">فني/ ...</h3>
                        <button onclick="location.reload()" class="bg-white/20 h-10 w-10 rounded-full flex items-center justify-center hover:bg-red-500 transition-colors">
                            <i class="fas fa-power-off"></i>
                        </button>
                    </div>
                    <div class="bg-black/20 p-5 rounded-[2rem] text-center border border-white/10 backdrop-blur-sm">
                        <p class="text-[10px] opacity-80 mb-1 font-bold">إجمالي مستحقاتك الحالية</p>
                        <span id="finalBalance" class="text-4xl font-black">0 ج.م</span>
                    </div>
                </div>
                <i class="fas fa-coins absolute -left-6 -bottom-6 text-8xl opacity-10"></i>
            </div>

            <div id="daysContainer" class="space-y-3 pb-10">
                </div>
        </div>
    </div>

    <script>
        // ضع هنا الرابط الخاص بملف CSV من جوجل (Publish to Web)
        const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQvLQoElSNVp2n_iYqLyRumgwiqEY2a__ntUOX29F3z3LExshiP774jh75jNbZM7J5oC9iB1OAEhln-/pub?output=csv"; 

        async function fetchData() {
            const id = document.getElementById('inputID').value;
            if(!id) return alert("من فضلك أدخل الكود الخاص بك");

            try {
                const response = await fetch(sheetUrl);
                const csvData = await response.text();
                const rows = csvData.split('\n').map(row => row.split(','));
                
                // البحث عن السجلات الخاصة بالكود
                const records = rows.filter(row => row[0]?.trim() === id);

                if(records.length > 0) {
                    document.getElementById('loginBox').classList.add('hidden');
                    document.getElementById('dashboard').classList.remove('hidden');
                    
                    let totalIncome = 0;
                    let totalAdvance = 0;
                    const container = document.getElementById('daysContainer');
                    container.innerHTML = ""; 

                    records.forEach(row => {
                        const [code, name, date, loc, time, wage, advance, note] = row;
                        
                        document.getElementById('displayName').innerText = "فني/ " + name;
                        totalIncome += parseFloat(wage || 0);
                        totalAdvance += parseFloat(advance || 0);

                        container.innerHTML += `
                            <div class="bg-white dark:bg-darkCard p-5 rounded-[2rem] shadow-sm border-r-8 border-brand">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <h4 class="text-sm font-black text-gray-800 dark:text-gray-100">${date}</h4>
                                        <p class="text-[11px] text-brand font-bold"><i class="fas fa-map-marker-alt ml-1"></i> ${loc}</p>
                                        <p class="text-[10px] text-gray-400 mt-2 font-semibold">المغادرة: ${time} | ${note || ''}</p>
                                    </div>
                                    <div class="text-left bg-gray-50 dark:bg-darkBg p-2 rounded-xl border border-gray-100 dark:border-gray-800 min-w-[70px]">
                                        <span class="block text-xs font-black text-green-600">+${wage} ج</span>
                                        ${advance > 0 ? `<span class="block text-[10px] font-bold text-red-500 border-t mt-1 pt-1">-${advance} سلفة</span>` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    document.getElementById('finalBalance').innerText = (totalIncome - totalAdvance) + " ج.م";
                } else {
                    alert("الكود غير صحيح أو لا توجد بيانات مسجلة");
                }
            } catch (error) {
                alert("تعذر الاتصال ببيانات جوجل شيت، تأكد من نشر الملف بصيغة CSV");
            }
        }
    </script>
</body>
</html>

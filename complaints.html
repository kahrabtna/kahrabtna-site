<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الشكاوى | كهربتنا</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #fcfcfc; }
        .input-focus:focus { border-color: #ef4444; ring: 2px; ring-color: #fee2e2; }
    </style>
</head>
<body class="p-6 text-right">

    <div class="max-w-md mx-auto">
        <div class="mb-8 border-r-8 border-red-600 pr-4">
            <h1 class="text-2xl font-black text-gray-800">تقديم شكوى رسمية</h1>
            <p class="text-xs text-gray-500 font-bold uppercase tracking-tighter">نحن هنا لضمان حقك وحل مشكلتك فوراً</p>
        </div>

        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-gray-100">
            <div class="space-y-5">
                <div>
                    <label class="block text-[10px] font-black text-gray-400 mb-2 mr-2">اسم صاحب الشكوى</label>
                    <input type="text" id="customerName" placeholder="اكتب اسمك بالكامل" 
                           class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-red-500 outline-none font-bold text-sm">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 mb-2 mr-2">رقم الموبايل للتواصل</label>
                    <input type="tel" id="customerPhone" placeholder="رقمك للتواصل بخصوص الحل" 
                           class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-red-500 outline-none font-bold text-sm text-right">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 mb-2 mr-2">اسم الفني المشكو في حقه (إن وجد)</label>
                    <input type="text" id="techComplaintName" placeholder="من قام بالخدمة؟" 
                           class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-red-500 outline-none font-bold text-sm">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-gray-400 mb-2 mr-2">تفاصيل المشكلة</label>
                    <textarea id="complaintDetails" rows="5" placeholder="اشرح لنا ما حدث بالتفصيل..." 
                              class="w-full p-4 bg-gray-50 rounded-2xl border-none focus:ring-2 focus:ring-red-500 outline-none font-bold text-sm resize-none"></textarea>
                </div>

                <div class="bg-red-50 p-4 rounded-2xl border border-red-100 mb-6 text-center">
                    <p class="text-[10px] text-red-700 font-bold">⚠️ سيتم مراجعة الشكوى من قبل الإدارة والرد خلال 60 دقيقة.</p>
                </div>

                <button onclick="sendComplaint()" 
                        class="w-full bg-red-600 text-white py-5 rounded-2xl font-black shadow-lg hover:bg-red-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i class="fas fa-exclamation-triangle"></i>
                    إرسال الشكوى الرسمية
                </button>
            </div>
        </div>

        <p class="text-center mt-10 text-[9px] text-gray-400 font-bold leading-loose">
            قسم الشكاوى يعمل على مدار الساعة لضمان جودة "كهربتنا" <br>
            بإشراف مباشر من: <span class="text-gray-600">إدارة كهربتنا</span>
        </p>
    </div>

    <script>
        function sendComplaint() {
            const name = document.getElementById('customerName').value;
            const phone = document.getElementById('customerPhone').value;
            const tech = document.getElementById('techComplaintName').value || "غير محدد";
            const details = document.getElementById('complaintDetails').value;
            
            if (!name || !phone || !details) {
                alert("برجاء ملء البيانات الأساسية (الاسم، الموبايل، وتفاصيل الشكوى)");
                return;
            }

            const message = `*بلاغ شكوى رسمي*%0A------------------%0A*من:* ${name}%0A*موبايل:* ${phone}%0A*ضد الفني:* ${tech}%0A*المشكلة:* ${details}`;
            
            // سيصل البلاغ لـ حسام عبده مباشرة
            window.location.href = `https://wa.me/201037165697?text=${message}`;
        }
    </script>
</body>
</html>
